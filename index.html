<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>بوتيك معتز | سوق ابو شراء الأبيض</title>
<style>
body{font-family:system-ui;background:#fdeef3;margin:0;padding:16px}
header{text-align:center;margin-bottom:16px}
header h1{color:#d81b60;margin:0;font-size:24px}
.search input{width:100%;padding:12px;border:2px solid #f8bbd0;border-radius:20px;margin:12px 0;font-size:16px}
.filters{display:flex;gap:8px;overflow-x:auto;margin-bottom:16px;padding-bottom:4px}
.filters button{padding:8px 16px;border:2px solid #d81b60;border-radius:20px;background:#fff;color:#d81b60;white-space:nowrap;font-size:14px}
.filters button.active{background:#d81b60;color:#fff}
.card{background:#fff;border-radius:16px;box-shadow:0 2px 8px rgba(0,0,0,.1);margin-bottom:16px;overflow:hidden;position:relative}
.card img{width:100%;height:220px;object-fit:cover;background:#eee}
.card .badge{position:absolute;top:0;right:0;background:#9c27b0;color:#fff;padding:4px 10px;border-radius:0 0 0 12px;font-size:12px;margin:8px;z-index:2}
.card .body{padding:12px;text-align:right}
.card h3{margin:0 0 4px 0;color:#333;font-size:18px}
.card p{margin:0 0 8px 0;color:#666;font-size:14px}
.btn{display:block;width:100%;padding:12px;background:#e91e63;color:#fff;border:none;border-radius:12px;font-weight:bold;text-align:center;text-decoration:none;font-size:16px}
</style>
</head>
<body>
<header><h1>بوتيك معتز 👗</h1></header>
<div class="search"><input id="q" placeholder="فتش عن ملبوسات، ساعة، هدية..."></div>
<div class="filters" id="filters">
<button class="active" data-cat="all">الكل</button>
<button data-cat="أطفال">أطفال</button>
<button data-cat="شبابي">شبابي</button>
<button data-cat="ساعات نسائية">ساعات نسائية</button>
<button data-cat="هدايا">هدايا</button>
</div>
<div id="grid"></div>
<script>
const products = [
{name:"طقم أطفال بناتي", cat:"أطفال", details:"مقاسات 2 - 8 سنة | قطن 100%", badge:"جديد", image:"https://images.unsplash.com/photo-1519238263530-99bdd11df2b2?w=500"},
{name:"طقم أطفال ولادي", cat:"أطفال", details:"تيشيرت + بنطلون | عمر 3-10", image:"https://images.unsplash.com/photo-1503454537195-1dcabb73ffb9?w=500"},
{name:"ملبوسات شبابية", cat:"شبابي", details:"قمصان + بناطلين | S,M,L,XL", image:"https://images.unsplash.com/photo-1521572163474-6864f9cf17ab?w=500"},
{name:"ساعة يد نسائية", cat:"ساعات نسائية", details:"ذهبي انيق ضد الماء", badge:"متوفر", image:"https://images.unsplash.com/photo-1524592094714-0f0654e20314?w=500"},
{name:"طقم هدايا نسائي", cat:"هدايا", details:"ساعة + اسوارة + عطر", badge:"عرض", image:"https://images.unsplash.com/photo-1596461404969-9ae70f2830c0?w=500"}
];
const grid = document.getElementById('grid');
const q = document.getElementById('q');
function render(list){
grid.innerHTML = list.map(p=>`
<div class="card">
${p.badge?`<span class="badge">${p.badge}</span>`:''}
<img src="${p.image}" alt="${p.name}">
<div class="body">
<h3>${p.name}</h3>
<p>${p.details}</p>
<a class="btn" href="https://wa.me/249126715616?text=عايز ${p.name}" target="_blank">استفسر واتساب</a>
</div>
</div>`).join('');
}
render(products);
document.getElementById('filters').onclick=e=>{
if(e.target.tagName!=='BUTTON')return;
document.querySelectorAll('.filters button').forEach(b=>b.classList.remove('active'));
e.target.classList.add('active');
const cat=e.target.dataset.cat;
render(cat==='all'?products:products.filter(p=>p.cat===cat));
};
q.oninput=()=>{
const t=q.value.toLowerCase();
render(products.filter(p=>p.name.toLowerCase().includes(t)||p.details.toLowerCase().includes(t)));
};
</script>
</body>
</html>
